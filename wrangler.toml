name = "conflict-mapper"
compatibility_date = "2026-05-28"
pages_build_output_dir = "."

[vars]
AI_PROVIDER = "perplexity"
OPENROUTER_MODEL = "anthropic/claude-sonnet-4"
NVIDIA_MODEL = "nvidia/llama-3.3-nemotron-super-49b-v1"
REPORT_STATUS_STALE_MINUTES = "5"
TRANSLATE_RSS_ARTICLES = "true"
RSS_TRANSLATION_LIMIT = "80"
REPORT_MAX_TOKENS = "12000"
ALLOW_REPORT_FALLBACK = "true"
REPORT_AI_TIMEOUT_MS = "25000"

[[r2_buckets]]
binding = "REPORTS_BUCKET"
bucket_name = "conflict-mapper-reports"

[[d1_databases]]
binding = "DB"
database_name = "conflict-mapper"
database_id = "49aa99f0-ce33-4e72-86eb-c709af61997d"

[[kv_namespaces]]
binding = "CONFIG_KV"
id = "63dfed85005a469dbdde825124751ac9"
