<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Think Tanks - Conflict Mapper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="/assets/user-style.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box}
:root{--bg:#0a0c10;--surface:#0f1117;--surface-2:#141820;--surface-3:#1a2030;--border:rgba(196,30,58,.2);--border-dim:rgba(255,255,255,.07);--text:#dde2ec;--muted:#8a94a8;--faint:#4a5168;--accent:#c41e3a;--teal:#2dd4bf;--amber:#f59e0b;--font-display:'Rajdhani',sans-serif;--font-mono:'Share Tech Mono',monospace;--font-body:'Inter',system-ui,sans-serif}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6}
.shell{max-width:1500px;margin:0 auto;padding:32px 28px 56px}
.topline{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:22px}
.kicker{font-family:var(--font-mono);font-size:.68rem;letter-spacing:.18em;color:var(--accent);text-transform:uppercase}
h1{font-family:var(--font-display);font-size:clamp(2.2rem,4vw,4.8rem);line-height:.95;margin:8px 0 8px;text-transform:uppercase;letter-spacing:.02em}
.subtitle{max-width:920px;color:var(--muted);margin:0}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:1px solid var(--border-dim);background:var(--surface-2);color:var(--text);border-radius:5px;padding:9px 12px;font-family:var(--font-display);font-size:.82rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;text-decoration:none}
.btn:hover{border-color:var(--accent);background:rgba(196,30,58,.1)}
.toolbar{display:grid;grid-template-columns:minmax(260px,1.4fr) repeat(3,minmax(160px,1fr));gap:10px;padding:14px;background:var(--surface);border:1px solid var(--border-dim);border-radius:8px;margin-bottom:14px}
.field{display:grid;gap:5px}.label{font-family:var(--font-mono);font-size:.58rem;color:var(--faint);letter-spacing:.16em;text-transform:uppercase}.input,.select{width:100%;background:var(--surface-2);border:1px solid var(--border-dim);border-radius:5px;color:var(--text);font-family:var(--font-mono);font-size:.78rem;padding:9px 10px;outline:none}.input:focus,.select:focus{border-color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:10px;margin-bottom:16px}.stat{background:linear-gradient(180deg,var(--surface),rgba(15,17,23,.82));border:1px solid var(--border-dim);border-radius:8px;padding:14px}.stat-value{font-family:var(--font-display);font-size:1.8rem;font-weight:700;line-height:1}.stat-label{font-family:var(--font-mono);font-size:.58rem;color:var(--faint);letter-spacing:.14em;text-transform:uppercase;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px}.card{background:var(--surface);border:1px solid var(--border-dim);border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:10px;min-height:260px}.card-title{font-family:var(--font-display);font-size:1.25rem;font-weight:700;line-height:1.1;letter-spacing:.03em}.meta{display:flex;flex-wrap:wrap;gap:6px}.pill{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:var(--surface-3);border-radius:4px;padding:3px 6px}.pill.country{color:#93c5fd;background:rgba(59,130,246,.14)}.pill.region{color:var(--teal);background:rgba(45,212,191,.12)}
.section-label{font-family:var(--font-mono);font-size:.58rem;color:var(--faint);letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px}.body-text{color:var(--muted);font-size:.86rem}.expertise{display:flex;gap:6px;flex-wrap:wrap}.expertise span{font-family:var(--font-mono);font-size:.58rem;color:var(--text);background:rgba(255,255,255,.05);border:1px solid var(--border-dim);border-radius:4px;padding:3px 6px}.links{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto}.links a{font-family:var(--font-display);font-weight:700;font-size:.78rem;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;text-decoration:none}.empty{padding:30px;text-align:center;border:1px solid var(--border-dim);border-radius:8px;color:var(--faint);font-family:var(--font-mono);letter-spacing:.12em;text-transform:uppercase}
@media(max-width:850px){.topline{display:block}.actions{margin-top:14px}.toolbar,.stats{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}}@media(max-width:560px){.shell{padding:24px 16px 40px}.toolbar,.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="shell">
  <div class="topline">
    <div>
      <div class="kicker">Policy research directory</div>
      <h1>Think Tanks</h1>
      <p class="subtitle">Browse the Conflict Mapper think tank directory by country, regional focus, bias perspective, and subject-matter expertise. Source data: <code>datasources/ThinkTanksP.csv</code>.</p>
    </div>
    <div class="actions">
      <a class="btn" href="think-tank-latest-news.html">Latest News</a>
      <button class="btn" type="button" onclick="loadThinkTanks()">Refresh</button>
    </div>
  </div>

  <section class="toolbar" aria-label="Think tank filters">
    <div class="field"><label class="label" for="filter-search">Search</label><input class="input" id="filter-search" placeholder="name, region, topic, bias" oninput="render()"></div>
    <div class="field"><label class="label" for="filter-country">Country</label><select class="select" id="filter-country" onchange="render()"><option value="">All countries</option></select></div>
    <div class="field"><label class="label" for="filter-region">Region</label><select class="select" id="filter-region" onchange="render()"><option value="">All regions</option></select></div>
    <div class="field"><label class="label" for="filter-topic">Expertise</label><select class="select" id="filter-topic" onchange="render()"><option value="">All topics</option></select></div>
  </section>

  <section class="stats" aria-label="Directory statistics">
    <div class="stat"><div class="stat-value" id="stat-total">-</div><div class="stat-label">Visible</div></div>
    <div class="stat"><div class="stat-value" id="stat-countries">-</div><div class="stat-label">Countries</div></div>
    <div class="stat"><div class="stat-value" id="stat-regions">-</div><div class="stat-label">Regions</div></div>
    <div class="stat"><div class="stat-value" id="stat-topics">-</div><div class="stat-label">Topics</div></div>
  </section>

  <section id="results"><div class="empty">Loading think tank directory...</div></section>
</main>
<script>
'use strict';
let allThinkTanks = [];

loadThinkTanks();

async function loadThinkTanks() {
  const target = document.getElementById('results');
  target.innerHTML = '<div class="empty">Loading think tank directory...</div>';
  try {
    const res = await fetch('/data/think-tanks.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allThinkTanks = data.thinkTanks || [];
    populateFilters();
    render();
  } catch (err) {
    target.innerHTML = `<div class="empty">Unable to load think tank data: ${esc(err.message)}</div>`;
  }
}

function populateFilters() {
  setOptions('filter-country', unique(allThinkTanks.map(item => item.country)));
  setOptions('filter-region', unique(allThinkTanks.flatMap(item => splitRegions(item.regionFocus))));
  setOptions('filter-topic', unique(allThinkTanks.flatMap(item => item.expertise || [])));
}

function setOptions(id, values) {
  const el = document.getElementById(id);
  const current = el.value;
  const first = el.options[0].outerHTML;
  el.innerHTML = first + values.map(value => `<option value="${esc(value)}">${esc(value)}</option>`).join('');
  if (values.includes(current)) el.value = current;
}

function render() {
  const filtered = filterItems();
  updateStats(filtered);
  const target = document.getElementById('results');
  if (!filtered.length) {
    target.innerHTML = '<div class="empty">No think tanks match the current filters.</div>';
    return;
  }
  target.innerHTML = `<div class="grid">${filtered.map(renderCard).join('')}</div>`;
}

function filterItems() {
  const q = document.getElementById('filter-search').value.trim().toLowerCase();
  const country = document.getElementById('filter-country').value;
  const region = document.getElementById('filter-region').value;
  const topic = document.getElementById('filter-topic').value;
  return allThinkTanks.filter(item => {
    if (country && item.country !== country) return false;
    if (region && !splitRegions(item.regionFocus).includes(region)) return false;
    if (topic && !(item.expertise || []).includes(topic)) return false;
    if (q) {
      const haystack = [item.name, item.country, item.regionFocus, item.biasPerspective, item.expertiseText].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  }).sort((a, b) => a.name.localeCompare(b.name));
}

function renderCard(item) {
  return `
    <article class="card">
      <div>
        <div class="card-title">${esc(item.name)}</div>
        <div class="meta" style="margin-top:8px">
          <span class="pill country">${esc(item.country || 'unknown')}</span>
          ${splitRegions(item.regionFocus).slice(0, 3).map(region => `<span class="pill region">${esc(region)}</span>`).join('')}
        </div>
      </div>
      <div><div class="section-label">Perspective</div><div class="body-text">${esc(item.biasPerspective || 'Not specified')}</div></div>
      <div><div class="section-label">Subject Matter</div><div class="expertise">${(item.expertise || []).slice(0, 10).map(topic => `<span>${esc(topic)}</span>`).join('')}</div></div>
      <div class="links">
        ${item.url ? `<a href="${esc(item.url)}" target="_blank" rel="noopener">Site</a>` : ''}
        ${item.latestAnalysisUrl ? `<a href="${esc(item.latestAnalysisUrl)}" target="_blank" rel="noopener">Latest Analysis</a>` : ''}
        ${item.topicsUrl ? `<a href="${esc(item.topicsUrl)}" target="_blank" rel="noopener">Topics</a>` : ''}
        ${item.expertsUrl ? `<a href="${esc(item.expertsUrl)}" target="_blank" rel="noopener">Experts</a>` : ''}
      </div>
    </article>
  `;
}

function updateStats(items) {
  document.getElementById('stat-total').textContent = items.length;
  document.getElementById('stat-countries').textContent = unique(items.map(item => item.country)).length;
  document.getElementById('stat-regions').textContent = unique(items.flatMap(item => splitRegions(item.regionFocus))).length;
  document.getElementById('stat-topics').textContent = unique(items.flatMap(item => item.expertise || [])).length;
}

function splitRegions(value) {
  return String(value || '').split('/').map(item => item.trim()).filter(Boolean);
}

function unique(values) {
  return [...new Set(values.filter(Boolean).map(value => String(value).trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b));
}

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}
</script>
</body>
</html>
