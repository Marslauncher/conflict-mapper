<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map & Feed — Conflict Mapper</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<!-- Leaflet MarkerCluster CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

<style>
/* ── Reset / Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0c10;
  --surface: #12151c;
  --surface-2: #1a1e28;
  --surface-3: #222736;
  --border: rgba(255,255,255,0.1);
  --border-dim: rgba(255,255,255,0.06);
  --accent: #c41e3a;
  --accent-dim: rgba(196,30,58,0.08);
  --amber: #f59e0b;
  --green: #22c55e;
  --blue: #3b82f6;
  --purple: #a855f7;
  --text: #e8eaf0;
  --text-muted: rgba(232,234,240,0.55);
  --text-faint: rgba(232,234,240,0.3);
  --font-display: 'Rajdhani', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --font-body: 'Inter', sans-serif;
  --sidebar-w: 350px;
  --transition: 0.15s ease;
  --radius: 6px;
}

[data-theme="light"] {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface-2: #f5f7fa;
  --surface-3: #ebedf2;
  --border: rgba(0,0,0,0.1);
  --border-dim: rgba(0,0,0,0.06);
  --accent-dim: rgba(196,30,58,0.06);
  --text: #0f1117;
  --text-muted: rgba(15,17,23,0.55);
  --text-faint: rgba(15,17,23,0.35);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
}

/* ── Layout ── */
.map-shell {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  min-width: 280px;
  max-width: min(720px, 58vw);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: width var(--transition), min-width var(--transition);
  position: relative;
  z-index: 10;
  overflow: hidden;
}
.sidebar.feed-strip-hidden .sidebar-feed {
  display: none;
}
.sidebar.collapsed {
  width: 0;
  min-width: 0;
  border-right: none;
}

/* Sidebar header */
.sidebar-header {
  padding: 12px 14px 10px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border-dim);
  flex-shrink: 0;
}
.sidebar-title {
  font-family: var(--font-display);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.sidebar-title .live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2.5s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
  50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(34,197,94,0); }
}

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 10px;
  padding: 8px 14px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border-dim);
  flex-shrink: 0;
}
.stat-item {
  flex: 1;
  text-align: center;
}
.stat-val {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.stat-key {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  letter-spacing: 0.1em;
  color: var(--text-faint);
  text-transform: uppercase;
  margin-top: 2px;
}

/* Filters */
.sidebar-filters {
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border-dim);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.filter-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.filter-label {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  color: var(--text-faint);
  text-transform: uppercase;
  white-space: nowrap;
  width: 42px;
  flex-shrink: 0;
}
.filter-select {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius);
  padding: 4px 8px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text);
  outline: none;
  transition: border-color var(--transition);
}
.filter-select:focus { border-color: var(--accent); }

.category-checks {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.cat-check {
  display: flex;
  align-items: center;
  gap: 3px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  cursor: pointer;
}
.cat-check input { width: 12px; height: 12px; accent-color: var(--accent); }

/* Sidebar actions */
.sidebar-actions {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border-dim);
  flex-shrink: 0;
  display: flex;
  gap: 6px;
}

/* Feed */
.sidebar-feed {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.sidebar-feed::-webkit-scrollbar { width: 4px; }
.sidebar-feed::-webkit-scrollbar-track { background: transparent; }
.sidebar-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.feed-section-label {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  color: var(--text-faint);
  text-transform: uppercase;
  padding: 6px 14px 4px;
  border-top: 1px solid var(--border-dim);
  margin-top: 4px;
}

.article-item {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border-dim);
  cursor: pointer;
  transition: background var(--transition);
  position: relative;
}
.article-item:hover,
.article-item.marker-hovered {
  background: var(--accent-dim);
  box-shadow: inset 3px 0 0 var(--accent);
}

.article-title {
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 4px;
}
.article-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.article-source {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  text-transform: uppercase;
}
.article-time {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--text-faint);
}
.cat-badge {
  font-family: var(--font-mono);
  font-size: 0.52rem;
  letter-spacing: 0.06em;
  padding: 1px 5px;
  border-radius: 3px;
  text-transform: uppercase;
  font-weight: 600;
}
.cat-badge.conflict { background: rgba(196,30,58,0.18); color: #ef5b74; }
.cat-badge.political { background: rgba(245,158,11,0.18); color: #fbbf24; }
.cat-badge.technology { background: rgba(59,130,246,0.18); color: #60a5fa; }
.cat-badge.economic { background: rgba(34,197,94,0.18); color: #4ade80; }
.cat-badge.general { background: rgba(255,255,255,0.08); color: var(--text-faint); }

.flag-btn {
  position: absolute;
  right: 10px;
  top: 8px;
  font-size: 0.75rem;
  background: none;
  border: 1px solid var(--border-dim);
  border-radius: 3px;
  color: var(--text-faint);
  cursor: pointer;
  padding: 2px 5px;
  transition: all var(--transition);
  opacity: 0;
}
.article-item:hover .flag-btn { opacity: 1; }
.flag-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.read-btn {
  border: 1px solid var(--border-dim);
  border-radius: 3px;
  background: var(--surface-2);
  color: var(--text-faint);
  font-family: var(--font-mono);
  font-size: 0.54rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 3px 6px;
}
.read-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.loading-feed {
  padding: 20px 14px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-faint);
  text-align: center;
  letter-spacing: 0.1em;
}
.empty-feed {
  padding: 20px 14px;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text-faint);
  text-align: center;
  letter-spacing: 0.08em;
  line-height: 1.6;
}

.story-card,
.region-panel {
  margin: 8px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: linear-gradient(180deg, var(--surface-2), rgba(18,21,28,0.94));
  overflow: hidden;
  flex-shrink: 0;
}
.story-card { display: none; }
.story-card.visible { display: block; }
.story-card-head,
.region-panel-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 10px;
  border-bottom: 1px solid var(--border-dim);
}
.story-card-title {
  font-family: var(--font-display);
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
}
.story-card-close {
  margin-left: auto;
  background: none;
  border: 1px solid var(--border-dim);
  border-radius: 4px;
  color: var(--text-faint);
  cursor: pointer;
  padding: 2px 6px;
}
.story-card-body {
  padding: 10px;
  font-size: 0.76rem;
  line-height: 1.55;
  color: var(--text-muted);
}
.story-card-meta,
.additional-link-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.story-card-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.additional-reporting {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border-dim);
}
.additional-reporting-title,
.region-panel-title {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.additional-link {
  display: block;
  padding: 7px 0;
  border-bottom: 1px solid var(--border-dim);
  color: var(--text);
  text-decoration: none;
  font-family: var(--font-display);
  font-size: 0.78rem;
  line-height: 1.25;
}
.additional-link:hover { color: var(--accent); }
.region-panel {
  display: none;
}
.region-list {
  overflow-y: auto;
  padding: 4px 0;
}
.region-item {
  padding: 7px 10px;
  border-bottom: 1px solid var(--border-dim);
  cursor: pointer;
}
.region-item:hover,
.region-item.marker-hovered {
  background: var(--accent-dim);
  box-shadow: inset 3px 0 0 var(--accent);
}
.region-item-title {
  font-family: var(--font-display);
  font-size: 0.76rem;
  line-height: 1.25;
  color: var(--text);
}
.region-item-meta {
  margin-top: 3px;
  font-family: var(--font-mono);
  font-size: 0.54rem;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.alert-modal-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 300px;
  overflow-y: auto;
  margin-top: 12px;
}
.alert-modal-item {
  border: 1px solid var(--border-dim);
  border-radius: var(--radius);
  padding: 9px;
  background: var(--surface-2);
}
.alert-modal-title {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
}
.btn.watch-active {
  border-color: var(--green);
  color: var(--green);
}

/* ── Collapse Toggle ── */
.sidebar-toggle {
  position: absolute;
  right: -16px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 48px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 4px 4px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 20;
  color: var(--text-muted);
  font-size: 0.6rem;
  transition: background var(--transition), color var(--transition);
}
.sidebar-toggle:hover { background: var(--surface-3); color: var(--text); }

.mobile-sidebar-open,
.mobile-sidebar-close {
  display: none;
}
.mobile-sidebar-open {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 450;
  align-items: center;
  gap: 7px;
  min-height: 36px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: rgba(18,21,28,0.94);
  color: var(--text);
  font-family: var(--font-display);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
}
.mobile-sidebar-close {
  margin-left: auto;
  width: 32px;
  height: 32px;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border-dim);
  border-radius: var(--radius);
  background: var(--surface-2);
  color: var(--text-muted);
  font-family: var(--font-display);
  cursor: pointer;
}
.mobile-sidebar-close:hover,
.mobile-sidebar-open:hover {
  border-color: var(--accent);
  color: var(--text);
}
.sidebar-resize-handle {
  position: absolute;
  top: 0;
  right: 0;
  width: 7px;
  height: 100%;
  cursor: col-resize;
  z-index: 19;
  background: transparent;
}
.sidebar-resize-handle:hover,
.sidebar.resizing .sidebar-resize-handle {
  background: linear-gradient(90deg, transparent, rgba(196,30,58,0.28));
}

/* ── Map Area ── */
.map-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#map {
  width: 100%;
  height: 100%;
}

/* Map overlay controls */
.map-controls {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.map-control-group {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.map-ctrl-btn {
  display: block;
  width: 100%;
  padding: 6px 10px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  background: none;
  border: none;
  border-bottom: 1px solid var(--border-dim);
  cursor: pointer;
  text-align: left;
  transition: all var(--transition);
  white-space: nowrap;
}
.map-ctrl-btn:last-child { border-bottom: none; }
.map-ctrl-btn:hover, .map-ctrl-btn.active { background: var(--accent-dim); color: var(--text); }
.map-ctrl-btn.active { color: var(--accent); }

/* Attribution fix for dark map */
.leaflet-control-attribution {
  background: rgba(10,12,16,0.8) !important;
  color: rgba(255,255,255,0.3) !important;
  font-size: 0.55rem !important;
}
.leaflet-control-attribution a { color: rgba(255,255,255,0.4) !important; }

/* Marker cluster customization */
.time-cluster {
  background: color-mix(in srgb, var(--cluster-color, #c41e3a) 24%, transparent) !important;
  border: 2px solid color-mix(in srgb, var(--cluster-color, #c41e3a) 70%, transparent) !important;
  border-radius: 50%;
}
.time-cluster div {
  background: var(--cluster-color, #c41e3a) !important;
  color: #fff !important;
  font-family: var(--font-mono) !important;
  font-weight: 700 !important;
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--cluster-color, #c41e3a) 20%, transparent);
}
.time-cluster.age-hour { --cluster-color: #ef4444; }
.time-cluster.age-day { --cluster-color: #f97316; }
.time-cluster.age-week { --cluster-color: #eab308; }
.time-cluster.age-month { --cluster-color: #86efac; }
.time-cluster.age-archive { --cluster-color: #166534; }

/* Popup styling */
.leaflet-popup-content-wrapper {
  background: var(--surface) !important;
  border: 1px solid var(--border) !important;
  border-radius: var(--radius) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  color: var(--text) !important;
}
.leaflet-popup-tip { background: var(--surface) !important; }
.leaflet-popup-content {
  margin: 10px 14px !important;
  font-family: var(--font-body) !important;
  font-size: 0.82rem !important;
}
.popup-title {
  font-family: var(--font-display);
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.3;
}
.popup-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
}
.popup-source {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.popup-actions {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.popup-btn {
  padding: 4px 8px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid var(--border-dim);
  background: var(--surface-2);
  color: var(--text-muted);
  transition: all var(--transition);
}
.popup-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.popup-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.article-tooltip {
  background: rgba(18,21,28,0.97) !important;
  color: var(--text) !important;
  border: 1px solid rgba(196,30,58,0.55) !important;
  border-radius: var(--radius) !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.55) !important;
  width: 270px;
  max-width: 270px;
  padding: 8px 10px !important;
  white-space: normal !important;
  line-height: 1.25;
  pointer-events: auto;
}
.article-tooltip::before { border-top-color: rgba(196,30,58,0.55) !important; }
.article-map-label {
  width: 220px;
  max-width: 220px;
  border-color: var(--age-border, rgba(196,30,58,0.7)) !important;
  background: rgba(15,18,25,0.92) !important;
}
.article-map-label.age-hour { --age-border: #ef4444; }
.article-map-label.age-day { --age-border: #f97316; }
.article-map-label.age-week { --age-border: #eab308; }
.article-map-label.age-month { --age-border: #86efac; }
.article-map-label.age-archive { --age-border: #166534; }
.article-map-label .tooltip-summary,
.article-map-label .tooltip-meta {
  display: none;
}
.article-map-label.expanded,
.article-map-label:hover {
  z-index: 99999 !important;
}
.article-map-label.expanded .tooltip-summary,
.article-map-label.expanded .tooltip-meta,
.article-map-label:hover .tooltip-summary,
.article-map-label:hover .tooltip-meta {
  display: block;
}
.article-map-label .tooltip-title {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.article-map-label.expanded .tooltip-title,
.article-map-label:hover .tooltip-title {
  display: block;
}
.tooltip-title {
  font-family: var(--font-display);
  font-size: 0.86rem;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 5px;
}
.tooltip-summary {
  font-size: 0.68rem;
  line-height: 1.35;
  color: var(--text-muted);
}
.tooltip-meta {
  margin-top: 6px;
  font-family: var(--font-mono);
  font-size: 0.56rem;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  text-transform: uppercase;
}

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;

<script>
'use strict';

const API_TRACE_KEY = 'conflict-mapper:api-trace:v1';
const API_TRACE_LIMIT = 250;

function readApiTrace() {
  try {
    return JSON.parse(localStorage.getItem(API_TRACE_KEY) || '[]');
  } catch (_) {
    return [];
  }
}

function recordApiTrace(entry) {
  try {
    localStorage.setItem(API_TRACE_KEY, JSON.stringify([{
      timestamp: new Date().toISOString(),
      category: 'api',
      level: entry.level || 'info',
      message: entry.message || '',
      details: entry.details || {},
    }, ...readApiTrace()].slice(0, API_TRACE_LIMIT)));
  } catch (_) {}
}

const nativeFetch = window.fetch.bind(window);
window.fetch = async (input, init = {}) => {
  const started = performance.now();
  const url = typeof input === 'string' ? input : input?.url || String(input);
  const method = (init.method || (typeof input !== 'string' && input?.method) || 'GET').toUpperCase();
  try {
    const response = await nativeFetch(input, init);
    const durationMs = Math.round(performance.now() - started);
    if (url.includes('/api/') || url.includes('/reports/') || url.includes('/storage/')) {
      recordApiTrace({
        level: response.ok ? 'info' : 'warn',
        message: `${method} ${url} -> ${response.status}`,
        details: { method, url, status: response.status, ok: response.ok, contentType: response.headers.get('content-type') || '', durationMs },
      });
    }
    return response;
  } catch (err) {
    recordApiTrace({
      level: 'error',
      message: `${method} ${url} failed: ${err.message}`,
      details: { method, url, durationMs: Math.round(performance.now() - started) },
    });
    throw err;
  }
};

/* ── State ── */
let map, markersLayer, heatLayer;
let allArticles = [];
let filteredArticles = [];
let storyGroups = [];
let filteredGroups = [];
let articleMarkers = new Map();
let currentMapLayer = 'dark';
let heatmapOn = false;
let pendingFlag = null;
let toastTimer = null;
let feedWatchTimer = null;
let feedWatchEnabled = false;
let seenStoryKeys = new Set();
let alertArticles = [];
let firstArticleLoad = true;
let alertAudioCtx = null;
let visibleUpdateTimer = null;
let feedStripVisible = true;
let selectedLocationArticles = null;
let selectedLocationLabel = '';
const READ_ARTICLES_KEY = 'conflictMapper:readArticles:v1';
const readArticleKeys = loadReadArticleKeys();

const TILE_LAYERS = {
  dark: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  topo: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png'
};

const TILE_ATTRIBUTIONS = {
  dark: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  satellite: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP',
  topo: 'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, <a href="http://viewfinderpanoramas.org">SRTM</a>'
};

const CAT_COLORS = {
  breaking:    '#c41e3a',
  geopolitics: '#f59e0b',
  military:    '#f97316',
  political:   '#eab308',
  technology:  '#3b82f6',
  economic:    '#22c55e',
  general:     '#9ca3af',
  ai:          '#a855f7',
  research:    '#06b6d4',
  science:     '#06b6d4',
  conflict:    '#c41e3a',
};

const AGE_COLORS = {
  hour: '#ef4444',
  day: '#f97316',
  week: '#eab308',
  month: '#86efac',
  archive: '#166534',
};

function loadReadArticleKeys() {
  try {
    const parsed = JSON.parse(localStorage.getItem(READ_ARTICLES_KEY) || '[]');
    return new Set(Array.isArray(parsed) ? parsed.map(String) : []);
  } catch (_) {
    return new Set();
  }
}

function saveReadArticleKeys() {
  try {
    localStorage.setItem(READ_ARTICLES_KEY, JSON.stringify(Array.from(readArticleKeys).slice(-5000)));
  } catch (_) {}
}

function isArticleRead(article) {
  return readArticleKeys.has(articleKey(article));
}

/* ── Init ── */
function initMap() {
  map = L.map('map', {
    center: [20, 0],
    zoom: 2,
    zoomControl: true,
    attributionControl: true
  });

  // Initial dark tile layer
  L.tileLayer(TILE_LAYERS.dark, {
    attribution: TILE_ATTRIBUTIONS.dark,
    subdomains: 'abcd',
    maxZoom: 19,
    id: 'dark-layer'
  }).addTo(map);

  // Marker cluster group
  markersLayer = L.markerClusterGroup({
    showCoverageOnHover: false,
    zoomToBoundsOnClick: false,
    maxClusterRadius: 50,
    spiderfyOnMaxZoom: true,
    iconCreateFunction: buildClusterIcon
  });
  map.addLayer(markersLayer);
  markersLayer.on('clusterclick', handleClusterClick);
  map.on('move zoom moveend zoomend', scheduleVisibleArticleUpdate);

  initSidebarResize();
  loadArticles();
}

/* ── Data loading ── */
async function loadArticles(options = {}) {
  try {
    const [geoRes, feedRes] = await Promise.all([
      fetch('/api/articles/geo?limit=5000'),
      fetch('/api/articles?limit=5000')
    ]);

    let geoArticles = [];
    let feedArticles = [];

    if (geoRes.ok) {
      const data = await readApiJson(geoRes, '/api/articles/geo');
      geoArticles = data.data?.articles || data.articles || (Array.isArray(data) ? data : []);
    }

    if (feedRes.ok) {
      const data = await readApiJson(feedRes, '/api/articles');
      feedArticles = data.data?.articles || data.articles || (Array.isArray(data) ? data : []);
    }

    const articleMap = new Map();
    feedArticles.forEach(a => { if (a.id) articleMap.set(a.id, a); });
    geoArticles.forEach(a => {
      if (!a.id) return;
      articleMap.set(a.id, { ...(articleMap.get(a.id) || {}), ...a });
    });

    allArticles = articleMap.size ? Array.from(articleMap.values()) : geoArticles;

    if (!allArticles.length) {
      // Use mock data for demo
      allArticles = getMockArticles();
    }

    storyGroups = groupRelatedArticles(allArticles);
    detectSignificantNewStories(storyGroups, options);
    updateStats();
    applyFilters();
  } catch(e) {
    // Fall back to mock data
    allArticles = getMockArticles();
    storyGroups = groupRelatedArticles(allArticles);
    updateStats();
    applyFilters();
  }
}

async function refreshFeed() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.textContent = '↻ Loading...'; btn.disabled = true; }
  await loadArticles();
  if (btn) { btn.textContent = '↻ Refresh'; btn.disabled = false; }
  showToast('Feed refreshed');
}

async function fetchAllFeeds(options = {}) {
  const btn = document.getElementById('fetch-btn');
  if (btn && !options.silent) { btn.textContent = 'Fetching...'; btn.disabled = true; }
  try {
    const params = options.fast
      ? '?limitFeeds=12&maxItemsPerFeed=3&translationLimit=2&concurrency=3'
      : '?limitFeeds=150&maxItemsPerFeed=8&translationLimit=80&concurrency=6';
    const res = await fetch('/api/feeds/fetch' + params, { method: 'POST' });
    const data = await readApiJson(res, '/api/feeds/fetch');
    if (!res.ok || data.success === false) throw new Error(data.error || `HTTP ${res.status}`);
    if (!options.silent) showToast(data.message || 'Feeds fetched');
    await loadArticles({ alertOnNew: !!options.alertOnNew, silent: !!options.silent });
  } catch(e) {
    if (!options.silent) showToast(e.message || 'API not available - using demo data', true);
  } finally {
    if (btn && !options.silent) { btn.textContent = 'Fetch Feeds'; btn.disabled = false; }
  }
}

async function readApiJson(res, endpointLabel) {
  const contentType = res.headers.get('content-type') || '';
  const text = await res.text();
  if (!contentType.includes('application/json')) {
    const looksHtml = /^\s*(<!doctype\s+html|<html|<head|<body)/i.test(text);
    throw new Error(looksHtml
      ? `${endpointLabel} returned HTML instead of JSON. Check /api/status; this usually means a Pages Function runtime error or stale deployment.`
      : `${endpointLabel} returned ${contentType || 'unknown content type'} instead of JSON.`);
  }
  return text ? JSON.parse(text) : {};
}

function toggleFeedWatch() {
  feedWatchEnabled = !feedWatchEnabled;
  const btn = document.getElementById('feed-watch-btn');
  if (btn) {
    btn.classList.toggle('watch-active', feedWatchEnabled);
    btn.textContent = feedWatchEnabled ? 'Watching' : 'Auto Watch';
  }

  if (feedWatchEnabled) {
    initializeAlertAudio();
    seenStoryKeys = new Set(storyGroups.map(group => group.storyKey));
    feedWatchTimer = setInterval(() => {
      fetchAllFeeds({ silent: true, fast: true, alertOnNew: true });
    }, 15000);
    fetchAllFeeds({ silent: true, fast: true, alertOnNew: true });
    showToast('RSS auto-watch enabled');
  } else {
    clearInterval(feedWatchTimer);
    feedWatchTimer = null;
    showToast('RSS auto-watch stopped');
  }
}

function detectSignificantNewStories(groups, options = {}) {
  const keys = new Set(groups.map(group => group.storyKey).filter(Boolean));
  if (firstArticleLoad) {
    seenStoryKeys = keys;
    firstArticleLoad = false;
    return;
  }

  const newGroups = groups.filter(group => group.storyKey && !seenStoryKeys.has(group.storyKey));
  seenStoryKeys = new Set([...seenStoryKeys, ...keys]);
  const significant = newGroups
    .map(group => group.primary)
    .filter(isSignificantArticle)
    .slice(0, 8);
  if (options.alertOnNew && significant.length) showNewsAlert(significant);
}

function isSignificantArticle(article) {
  const text = `${article.title || ''} ${article.description || ''} ${article.category || ''}`.toLowerCase();
  return /(missile|airstrike|strike|attack|explosion|invasion|war|troops|nuclear|evacuation|emergency|cyberattack|ransomware|coup|sanction|taiwan|hormuz|gaza|ukraine|russia|china|iran|israel)/.test(text)
    || ['breaking', 'conflict', 'military'].includes(article.category || '');
}

function showNewsAlert(articles) {
  alertArticles = articles;
  const modal = document.getElementById('news-alert-modal');
  const list = document.getElementById('news-alert-list');
  const subtitle = document.getElementById('news-alert-subtitle');
  if (!modal || !list) return;
  if (subtitle) subtitle.textContent = `${articles.length} high-signal item${articles.length === 1 ? '' : 's'} detected by RSS auto-watch`;
  list.innerHTML = articles.map(article => `
    <div class="alert-modal-item">
      <div class="alert-modal-title">${escHtml(article.title || 'Untitled')}</div>
      <div class="additional-link-meta"><span>${escHtml(article.source || 'Unknown source')}</span><span>${timeAgo(article.pubDate || article.publishedAt)}</span><span>${escHtml(article.category || 'general')}</span></div>
    </div>
  `).join('');
  modal.classList.add('open');
  playAlertSound();
}

function closeNewsAlert() {
  document.getElementById('news-alert-modal')?.classList.remove('open');
}

function focusNewestAlert() {
  closeNewsAlert();
  if (alertArticles[0]) focusArticle(alertArticles[0]);
}

function initializeAlertAudio() {
  try {
    alertAudioCtx = alertAudioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (alertAudioCtx.state === 'suspended') alertAudioCtx.resume();
  } catch (_) {}
}

function playAlertSound() {
  try {
    initializeAlertAudio();
    if (!alertAudioCtx) return;
    const oscillator = alertAudioCtx.createOscillator();
    const gain = alertAudioCtx.createGain();
    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(880, alertAudioCtx.currentTime);
    oscillator.frequency.setValueAtTime(660, alertAudioCtx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.001, alertAudioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.16, alertAudioCtx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, alertAudioCtx.currentTime + 0.35);
    oscillator.connect(gain);
    gain.connect(alertAudioCtx.destination);
    oscillator.start();
    oscillator.stop(alertAudioCtx.currentTime + 0.38);
  } catch (_) {}
}

/* ── Filters ── */
function getActiveCategories() {
  return Array.from(document.querySelectorAll('.cat-check input:checked')).map(i => i.value);
}

function getTimeFilter() {
  const val = document.getElementById('filter-time')?.value || 'all';
  if (val === 'all') return null;
  const units = { '1h': 3600000, '6h': 21600000, '24h': 86400000, '7d': 604800000, '30d': 2592000000 };
  return Date.now() - (units[val] || units['24h']);
}

function applyFilters() {
  const cats = getActiveCategories();
  const since = getTimeFilter();
  const country = document.getElementById('filter-country')?.value || '';

  filteredGroups = storyGroups
    .map(group => {
      const visibleArticles = group.articles.filter(a => articleMatchesFilters(a, cats, country, since));
      if (!visibleArticles.length) return null;
      const primary = sortNewest(visibleArticles)[0];
      return {
        ...group,
        primary: {
          ...primary,
          additionalReporting: mergeAdditionalReporting(primary, visibleArticles.filter(a => a !== primary)),
          storyKey: group.storyKey,
          storyCount: visibleArticles.length,
        },
        visibleArticles,
      };
    })
    .filter(Boolean);

  filteredArticles = filteredGroups.map(group => group.primary);
  clearLocationSelection(false);

  updateMapMarkers();
  updateVisibleArticlePanels();
  updateStats();
}

function articleMatchesFilters(article, cats, country, since) {
  if (cats.length && !cats.includes(article.category || 'general')) return false;
  if (country && !articleMatchesCountry(article, country)) return false;
  const dateStr = article.pubDate || article.publishedAt;
  if (since && dateStr && new Date(dateStr).getTime() < since) return false;
  return true;
}

function articleMatchesCountry(article, country) {
  const aliases = {
    usa: ['usa', 'united states', 'u.s.', 'america'],
    china: ['china', 'chinese'],
    russia: ['russia', 'russian'],
    ukraine: ['ukraine'],
    taiwan: ['taiwan', 'taiwan strait'],
    iran: ['iran'],
    israel: ['israel', 'gaza'],
    india: ['india'],
    pakistan: ['pakistan'],
    'north-korea': ['north korea', 'dprk'],
    nato: ['nato'],
  }[country] || [country.replace(/-/g, ' '), country];
  const haystack = [article.country, article.geo?.country, article.geo?.place, article.title, article.description]
    .filter(Boolean)
    .join(' ')
    .toLowerCase();
  return aliases.some(alias => haystack.includes(alias));
}

function groupRelatedArticles(articles) {
  const groups = [];
  const byKey = new Map();
  const sorted = sortNewest(articles);

  sorted.forEach(article => {
    const storyKey = article.storyKey || articleStoryKey(article);
    const group = storyKey ? byKey.get(storyKey) : null;
    if (group) {
      group.articles.push(article);
      return;
    }
    const nextGroup = {
      storyKey: storyKey || String(article.id || article.link || groups.length),
      primary: article,
      articles: [article],
    };
    groups.push(nextGroup);
    if (storyKey) byKey.set(storyKey, nextGroup);
  });

  return groups.map(group => {
    const visible = sortNewest(group.articles);
    const primary = visible[0] || group.primary;
    return {
      ...group,
      primary: {
        ...primary,
        storyKey: group.storyKey,
        storyCount: visible.length,
        additionalReporting: mergeAdditionalReporting(primary, visible.slice(1)),
      },
      articles: visible,
    };
  });
}

function articleStoryKey(article) {
  const title = String(article.title || '').toLowerCase()
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^\p{L}\p{N}\s]/gu, ' ')
    .replace(/\s+/g, ' ')
    .trim();
  if (!title) return String(article.link || article.id || '');
  const stop = new Set(['the','and','for','with','from','that','this','into','over','after','before','says','said','new','live','news','update','updates','analysis','report','a','an','to','of','in','on','as','by','at','is','are','be','was','were']);
  const tokens = title.split(' ').filter(token => token.length > 2 && !stop.has(token)).slice(0, 16);
  return tokens.length < 3 ? title.slice(0, 90) : tokens.sort().slice(0, 12).join('|');
}

function mergeAdditionalReporting(primary, duplicates = []) {
  const refs = [
    ...(Array.isArray(primary.additionalReporting) ? primary.additionalReporting : []),
    ...duplicates.map(compactArticle),
  ];
  const seen = new Set([String(primary.link || primary.url || primary.id || '').toLowerCase()]);
  return refs.filter(ref => {
    const key = String(ref.link || ref.url || ref.id || ref.title || '').toLowerCase();
    if (!key || seen.has(key)) return false;
    seen.add(key);
    return true;
  }).slice(0, 12);
}

function compactArticle(article) {
  return {
    id: article.id || '',
    title: article.title || '',
    source: article.source || '',
    link: article.link || article.url || '',
    pubDate: article.pubDate || article.publishedAt || '',
    category: article.category || '',
  };
}

function sortNewest(articles) {
  return [...(articles || [])].sort((a, b) => {
    const ta = (a.pubDate || a.publishedAt) ? new Date(a.pubDate || a.publishedAt).getTime() : 0;
    const tb = (b.pubDate || b.publishedAt) ? new Date(b.pubDate || b.publishedAt).getTime() : 0;
    return tb - ta;
  });
}

/* ── Map markers ── */
function updateMapMarkers() {
  markersLayer.clearLayers();
  articleMarkers.clear();

  const geoArticles = filteredArticles.filter(a => {
    return !!getGeoCoords(a) && !isArticleRead(a);
  });

  geoArticles.forEach(article => {
    const { lat, lng } = getGeoCoords(article);
    const color = getArticleAgeColor(article);
    const ageBucket = getArticleAgeBucket(article);
    const key = articleKey(article);
    const marker = L.circleMarker([lat, lng], {
      radius: 9,
      fillColor: color,
      color: '#05070a',
      weight: 2,
      opacity: 0.9,
      fillOpacity: 0.8
    });

    marker._cmBaseStyle = { radius: 9, fillColor: color, color: '#05070a', weight: 2, fillOpacity: 0.8 };
    marker._cmHighlightStyle = { radius: 13, fillColor: color, color: '#ffffff', weight: 3, fillOpacity: 1 };
    marker._cmArticleKey = key;
    marker._cmArticle = article;
    marker.on('click', () => showStoryCard(article));
    marker.on('mouseover', () => {
      highlightFeedArticle(key, true);
      highlightMarker(marker, true);
      setTooltipExpanded(marker, true);
    });
    marker.on('mouseout', () => {
      highlightFeedArticle(key, false);
      highlightMarker(marker, false);
      setTooltipExpanded(marker, false);
    });
    marker.bindTooltip(buildTooltip(article), {
      direction: 'top',
      offset: [0, -8],
      permanent: false,
      sticky: true,
      opacity: 0.98,
      interactive: true,
      className: `article-tooltip article-map-label age-${ageBucket}`,
    });
    marker.bindPopup(buildPopup(article), { maxWidth: 300, minWidth: 240 });
    articleMarkers.set(key, marker);
    markersLayer.addLayer(marker);
  });

  // Update heatmap if active
  if (heatmapOn) updateHeatmap();

  // Update stat
  document.getElementById('stat-geo').textContent = geoArticles.length;
}

function buildClusterIcon(cluster) {
  const markers = cluster.getAllChildMarkers ? cluster.getAllChildMarkers() : [];
  const articles = markers.map(marker => marker._cmArticle).filter(Boolean);
  const newest = articles.reduce((best, article) => {
    const time = articleTimeValue(article);
    return time > articleTimeValue(best) ? article : best;
  }, null);
  const ageBucket = getArticleAgeBucket(newest);
  const count = cluster.getChildCount();
  const size = count >= 100 ? 54 : count >= 10 ? 46 : 38;
  return L.divIcon({
    html: `<div style="width:${size - 10}px;height:${size - 10}px;line-height:${size - 10}px;border-radius:50%;text-align:center">${count}</div>`,
    className: `marker-cluster time-cluster age-${ageBucket}`,
    iconSize: [size, size],
  });
}

function handleClusterClick(event) {
  const cluster = event.layer;
  const markers = cluster?.getAllChildMarkers ? cluster.getAllChildMarkers() : [];
  const articles = markers.map(marker => marker._cmArticle).filter(Boolean).filter(article => !isArticleRead(article));
  if (!articles.length) return;
  const center = cluster.getLatLng ? cluster.getLatLng() : null;
  selectedLocationArticles = sortNewest(articles);
  selectedLocationLabel = locationLabelForArticles(selectedLocationArticles, center);
  updateFeedList();
  if (map && center) {
    const nextZoom = Math.min(map.getMaxZoom(), Math.max(map.getZoom() + 2, 7));
    map.setView(center, nextZoom, { animate: true });
  }
}

function locationLabelForArticles(articles, center) {
  const places = articles
    .map(article => article.geo?.place || article.location || article.geo?.country || article.country)
    .filter(Boolean);
  const byPlace = places.reduce((acc, place) => {
    const key = String(place);
    acc.set(key, (acc.get(key) || 0) + 1);
    return acc;
  }, new Map());
  const [place] = Array.from(byPlace.entries()).sort((a, b) => b[1] - a[1])[0] || [];
  if (place) return place;
  if (center) return `${center.lat.toFixed(2)}, ${center.lng.toFixed(2)}`;
  return 'Selected location';
}

function getArticleAgeBucket(article) {
  const time = articleTimeValue(article);
  if (!time) return 'archive';
  const ageMs = Date.now() - time;
  if (ageMs <= 60 * 60 * 1000) return 'hour';
  if (ageMs <= 24 * 60 * 60 * 1000) return 'day';
  if (ageMs <= 7 * 24 * 60 * 60 * 1000) return 'week';
  if (ageMs <= 30 * 24 * 60 * 60 * 1000) return 'month';
  return 'archive';
}

function getArticleAgeColor(article) {
  return AGE_COLORS[getArticleAgeBucket(article)] || AGE_COLORS.archive;
}

function articleTimeValue(article) {
  const value = article?.pubDate || article?.publishedAt || article?.fetchedAt;
  const time = value ? new Date(value).getTime() : 0;
  return Number.isFinite(time) ? time : 0;
}

function setTooltipExpanded(marker, expanded) {
  const tooltip = marker?.getTooltip?.();
  const element = tooltip?.getElement?.();
  if (element) element.classList.toggle('expanded', expanded);
}

function getGeoCoords(a) {
  const lat = Number(a.lat ?? a.geo?.lat);
  const lng = Number(a.lng ?? a.geo?.lng);
  return Number.isFinite(lat) && Number.isFinite(lng) && !(lat === 0 && lng === 0) ? { lat, lng } : null;
}

function buildPopup(article) {
  const cat = article.category || 'general';
  const catColor = CAT_COLORS[cat] || CAT_COLORS.general;
  const additionalCount = Array.isArray(article.additionalReporting) ? article.additionalReporting.length : 0;
  return `
    <div class="popup-title">${escHtml(article.title || 'Untitled')}</div>
    <div class="popup-meta">
      <span class="cat-badge ${cat}" style="background:${catColor}22;color:${catColor}">${escHtml(cat)}</span>
      <span class="popup-source">${escHtml(article.source || 'Unknown')}</span>
    </div>
    <div style="font-size:0.7rem;color:#888;margin-bottom:8px">${timeAgo(article.pubDate || article.publishedAt)}</div>
    ${additionalCount ? `<div style="font-size:0.68rem;color:#aaa;margin-bottom:8px">${additionalCount} additional related report${additionalCount === 1 ? '' : 's'}</div>` : ''}
    <div class="popup-actions">
      ${(article.link || article.url) ? `<a href="${escHtml(article.link || article.url)}" target="_blank" rel="noopener" class="popup-btn primary" style="text-decoration:none">Read</a>` : ''}
      <button class="popup-btn" onclick="openFlagModal(${JSON.stringify({ id: article.id, title: article.title }).replace(/"/g, '&quot;')})">⚑ Flag</button>
      <button class="popup-btn" onclick="markArticleRead(${JSON.stringify(article).replace(/"/g, '&quot;')})">Mark Read</button>
    </div>
  `;
}

function buildTooltip(article) {
  const description = article.description || article.summary || '';
  const preview = description.length > 190 ? `${description.slice(0, 187)}...` : description;
  return `
    <div class="tooltip-title">${escHtml(article.title || 'Untitled')}</div>
    ${preview ? `<div class="tooltip-summary">${escHtml(preview)}</div>` : ''}
    <div class="tooltip-meta">${escHtml(article.source || 'Unknown source')} · ${timeAgo(article.pubDate || article.publishedAt)}${article.geo?.place ? ` · ${escHtml(article.geo.place)}` : ''}</div>
  `;
}

function articleKey(article) {
  return String(article?.id || article?.storyKey || article?.link || article?.url || article?.title || '').replace(/\s+/g, '-');
}

function highlightMarker(marker, active) {
  if (!marker?.setStyle) return;
  marker.setStyle(active ? marker._cmHighlightStyle : marker._cmBaseStyle);
  if (active && marker.bringToFront) marker.bringToFront();
}

function highlightArticleMarker(key, active) {
  const marker = articleMarkers.get(String(key || ''));
  if (!marker) return;
  highlightMarker(marker, active);
  if (active && marker.openTooltip) marker.openTooltip();
  if (!active && marker.closeTooltip) marker.closeTooltip();
}

function highlightFeedArticle(key, active) {
  const safeKey = String(key || '');
  document.querySelectorAll(`[data-article-key="${cssEscapeValue(safeKey)}"]`).forEach(el => {
    el.classList.toggle('marker-hovered', active);
  });
}

function cssEscapeValue(value) {
  if (window.CSS?.escape) return CSS.escape(value);
  return String(value).replace(/"/g, '\\"');
}

/* ── Heatmap ── */
function toggleHeatmap() {
  heatmapOn = !heatmapOn;
  const btn = document.getElementById('heatmap-toggle');
  if (btn) btn.classList.toggle('active', heatmapOn);

  if (heatmapOn) {
    updateHeatmap();
  } else if (heatLayer) {
    map.removeLayer(heatLayer);
    heatLayer = null;
  }
}

function updateHeatmap() {
  if (heatLayer) map.removeLayer(heatLayer);
  const points = filteredArticles
    .map(getGeoCoords)
    .filter(Boolean)
    .map(({ lat, lng }) => [lat, lng, 0.5]);

  if (points.length && typeof L.heatLayer === 'function') {
    heatLayer = L.heatLayer(points, {
      radius: 35,
      blur: 20,
      maxZoom: 10,
      gradient: { 0.4: '#3b82f6', 0.65: '#f59e0b', 1: '#c41e3a' }
    }).addTo(map);
  }
}

/* ── Map layers ── */
let currentTileLayer = null;
function setMapLayer(type) {
  if (currentTileLayer) map.removeLayer(currentTileLayer);
  currentTileLayer = L.tileLayer(TILE_LAYERS[type], {
    attribution: TILE_ATTRIBUTIONS[type],
    subdomains: type === 'dark' ? 'abcd' : 'abc',
    maxZoom: 19
  }).addTo(map);
  currentMapLayer = type;

  // Update button states
  document.querySelectorAll('[id^="layer-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('layer-' + type)?.classList.add('active');
}

function resetMapView() {
  map.setView([20, 0], 2);
}

/* ── Feed list ── */
function updateFeedList() {
  const container = document.getElementById('article-feed');
  if (!container) return;
  if (!feedStripVisible) return;
  const selected = Array.isArray(selectedLocationArticles) && selectedLocationArticles.length
    ? selectedLocationArticles.filter(article => !isArticleRead(article))
    : null;
  const visibleArticles = selected || getVisibleArticles();

  if (!visibleArticles.length) {
    container.innerHTML = `<div class="empty-feed">No geotagged articles are visible in this map view.<br>Move or zoom the map, or expand filters.</div>`;
    return;
  }

  const sorted = sortNewest(visibleArticles);
  const rendered = sorted.slice(0, 250);

  container.innerHTML = `
    <div class="feed-section-label">
      ${selected ? `Selected Location: ${escHtml(selectedLocationLabel || 'Map Selection')}` : 'Visible Articles'}
      (${sorted.length}${sorted.length > rendered.length ? `, showing newest ${rendered.length}` : ''})
      ${selected ? `<button class="read-btn" style="float:right;margin-top:-3px" onclick="clearLocationSelection()">Clear</button>` : ''}
    </div>
    ${rendered.map(a => `
      <div class="article-item" data-article-key="${escHtml(articleKey(a))}" onclick="focusArticle(${JSON.stringify(a).replace(/"/g, '&quot;')})">
        <button class="flag-btn" title="Flag for analysis" onclick="event.stopPropagation(); openFlagModal(${JSON.stringify({ id: a.id, title: a.title }).replace(/"/g, '&quot;')})">⚑</button>
        <div class="article-title">${escHtml(a.title || 'Untitled')}</div>
        <div class="article-meta">
          <span class="cat-badge ${a.category || 'general'}">${escHtml(a.category || 'general')}</span>
          <span class="article-source">${escHtml(a.source || 'Unknown')}</span>
          <span class="article-time">${timeAgo(a.pubDate || a.publishedAt)}</span>
          ${a.additionalReporting?.length ? `<span class="article-time">+${a.additionalReporting.length} related</span>` : ''}
          <button class="read-btn" onclick="event.stopPropagation(); markArticleRead(${JSON.stringify(a).replace(/"/g, '&quot;')})">Read</button>
        </div>
      </div>
    `).join('')}
    ${sorted.length > rendered.length ? '<div class="empty-feed" style="padding:12px">Zoom into an area to narrow the visible article strip.</div>' : ''}
  `;
  attachArticleHoverHandlers(container);
}

function clearLocationSelection(refresh = true) {
  selectedLocationArticles = null;
  selectedLocationLabel = '';
  if (refresh) updateFeedList();
}

function focusArticle(article) {
  showStoryCard(article);
  const coords = getGeoCoords(article);
  if (coords) {
    const { lat, lng } = coords;
    map.setView([lat, lng], 6, { animate: true });
  }
}

function markArticleRead(article) {
  const key = articleKey(article);
  if (!key) return;
  readArticleKeys.add(key);
  saveReadArticleKeys();
  if (Array.isArray(selectedLocationArticles)) {
    selectedLocationArticles = selectedLocationArticles.filter(item => articleKey(item) !== key);
  }
  closeStoryCard();
  updateMapMarkers();
  updateVisibleArticlePanels();
  updateStats();
  showToast('Article hidden from map. It remains available in News Library.');
}

function showStoryCard(article) {
  const card = document.getElementById('story-card');
  const title = document.getElementById('story-card-title');
  const body = document.getElementById('story-card-body');
  if (!card || !title || !body) return;
  const cat = article.category || 'general';
  const catColor = CAT_COLORS[cat] || CAT_COLORS.general;
  const additional = Array.isArray(article.additionalReporting) ? article.additionalReporting : [];
  title.textContent = article.title || 'Untitled story';
  body.innerHTML = `
    <div class="story-card-meta">
      <span class="cat-badge ${cat}" style="background:${catColor}22;color:${catColor}">${escHtml(cat)}</span>
      <span>${escHtml(article.source || 'Unknown source')}</span>
      <span>${timeAgo(article.pubDate || article.publishedAt)}</span>
      ${article.geo?.place || article.location ? `<span>${escHtml(article.geo?.place || article.location)}</span>` : ''}
    </div>
    <div>${escHtml(article.description || article.summary || 'No parsed summary is available for this article yet.')}</div>
    <div class="story-card-actions">
      ${(article.link || article.url) ? `<a href="${escHtml(article.link || article.url)}" target="_blank" rel="noopener" class="btn btn-primary btn-sm" style="text-decoration:none">Open Source</a>` : ''}
      <button class="btn btn-secondary btn-sm" onclick="openFlagModal(${JSON.stringify({ id: article.id, title: article.title }).replace(/"/g, '&quot;')})">Flag</button>
      <button class="btn btn-secondary btn-sm" onclick="markArticleRead(${JSON.stringify(article).replace(/"/g, '&quot;')})">Mark Read</button>
    </div>
    <div class="additional-reporting">
      <div class="additional-reporting-title">Additional Reporting</div>
      ${additional.length ? additional.map(item => `
        <a class="additional-link" href="${escHtml(item.link || item.url || '#')}" target="_blank" rel="noopener">
          ${escHtml(item.title || 'Related report')}
          <div class="additional-link-meta"><span>${escHtml(item.source || 'Unknown source')}</span><span>${timeAgo(item.pubDate || item.publishedAt)}</span></div>
        </a>
      `).join('') : '<div class="empty-feed" style="padding:10px 0;text-align:left">No duplicate or related reporting has been grouped with this story yet.</div>'}
    </div>
  `;
  card.classList.add('visible');
  if (isMobileMapViewport()) openMobileSidebar();
}

function closeStoryCard() {
  document.getElementById('story-card')?.classList.remove('visible');
}

function isMobileMapViewport() {
  return window.matchMedia('(max-width: 820px)').matches;
}

function openMobileSidebar() {
  const sidebarEl = document.getElementById('sidebar');
  if (!sidebarEl) return;
  sidebarEl.classList.add('mobile-open');
  setTimeout(() => map?.invalidateSize?.(), 180);
}

function closeMobileSidebar() {
  const sidebarEl = document.getElementById('sidebar');
  if (!sidebarEl) return;
  sidebarEl.classList.remove('mobile-open');
  setTimeout(() => map?.invalidateSize?.(), 180);
}

function updateRegionList() {
  const list = document.getElementById('region-article-list');
  const label = document.getElementById('region-count-label');
  if (!list || !label || !map) return;
  const visible = getVisibleArticles();
  const scopeLabel = isWorldMapView() ? 'in current filter set' : 'in current map view';
  label.textContent = `${visible.length} article${visible.length === 1 ? '' : 's'} ${scopeLabel}`;
  if (!visible.length) {
    list.innerHTML = '<div class="empty-feed" style="padding:12px">No geotagged articles in the visible map area.</div>';
    return;
  }
  const rendered = visible.slice(0, 500);
  list.innerHTML = rendered.map(article => `
    <div class="region-item" data-article-key="${escHtml(articleKey(article))}" onclick="focusArticle(${JSON.stringify(article).replace(/"/g, '&quot;')})">
      <div class="region-item-title">${escHtml(article.title || 'Untitled')}</div>
      <div class="region-item-meta">${escHtml(article.source || 'Unknown')} · ${formatArticleDate(article.pubDate || article.publishedAt || article.fetchedAt)} · ${timeAgo(article.pubDate || article.publishedAt)}${article.geo?.place ? ` · ${escHtml(article.geo.place)}` : ' · no map coordinate'}</div>
    </div>
  `).join('') + (visible.length > rendered.length ? '<div class="empty-feed" style="padding:12px">Showing newest 500 articles.</div>' : '');
  attachArticleHoverHandlers(list);
}

function getVisibleArticles() {
  const mapArticles = filteredArticles.filter(article => !isArticleRead(article));
  if (!map) return sortNewest(mapArticles);
  if (isWorldMapView()) return sortNewest(mapArticles);
  const bounds = map.getBounds();
  return sortNewest(mapArticles.filter(article => {
    const coords = getGeoCoords(article);
    return coords && bounds.contains([coords.lat, coords.lng]);
  }));
}

function updateVisibleArticlePanels() {
  updateFeedList();
  updateRegionList();
}

function isWorldMapView() {
  if (!map) return true;
  const bounds = map.getBounds();
  const west = bounds.getWest();
  const east = bounds.getEast();
  const south = bounds.getSouth();
  const north = bounds.getNorth();
  const lngSpan = Math.abs(east - west);
  const latSpan = Math.abs(north - south);
  return map.getZoom() <= 2 || lngSpan >= 300 || latSpan >= 135;
}

function scheduleVisibleArticleUpdate() {
  clearTimeout(visibleUpdateTimer);
  visibleUpdateTimer = setTimeout(updateVisibleArticlePanels, 120);
}

function attachArticleHoverHandlers(container) {
  container.querySelectorAll('[data-article-key]').forEach(el => {
    const key = el.getAttribute('data-article-key');
    el.addEventListener('mouseenter', () => highlightArticleMarker(key, true));
    el.addEventListener('mouseleave', () => highlightArticleMarker(key, false));
  });
}

function toggleArticleStrip() {
  feedStripVisible = !feedStripVisible;
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('feed-strip-btn');
  sidebar?.classList.toggle('feed-strip-hidden', !feedStripVisible);
  if (btn) btn.textContent = feedStripVisible ? 'Hide Feed' : 'Show Feed';
  updateVisibleArticlePanels();
}

/* ── Stats ── */
function updateStats() {
  const mapArticles = filteredArticles.filter(article => !isArticleRead(article));
  document.getElementById('stat-total').textContent = mapArticles.length;
  document.getElementById('stat-geo').textContent = mapArticles.filter(a => getGeoCoords(a)).length;
  const sources = new Set(mapArticles.map(a => a.source).filter(Boolean));
  document.getElementById('stat-sources').textContent = sources.size;
}

/* ── Flag modal ── */
function openFlagModal(article) {
  pendingFlag = article;
  document.getElementById('flag-article-title').textContent = article.title || 'Article';
  document.getElementById('flag-notes').value = '';
  document.getElementById('flag-country').value = '';
  document.getElementById('flag-modal').classList.add('open');
}

function closeFlagModal() {
  document.getElementById('flag-modal').classList.remove('open');
  pendingFlag = null;
}

async function submitFlag() {
  if (!pendingFlag) return;
  const country = document.getElementById('flag-country').value;
  const notes = document.getElementById('flag-notes').value.trim();

  try {
    const res = await fetch('/api/articles/flag', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ articleId: pendingFlag.id, country, notes })
    });
    if (res.ok) {
      showToast('Article flagged for analysis');
    } else {
      showToast('Flagged locally (API offline)', false);
    }
  } catch(e) {
    showToast('Flagged locally (API offline)', false);
  }
  closeFlagModal();
}

/* ── Sidebar toggle ── */
let sidebarOpen = true;
function initSidebarResize() {
  const sidebar = document.getElementById('sidebar');
  const handle = document.getElementById('sidebar-resize-handle');
  if (!sidebar || !handle) return;
  let startX = 0;
  let startWidth = 0;

  const onMove = (event) => {
    const next = Math.max(280, Math.min(720, startWidth + event.clientX - startX));
    sidebar.style.width = `${next}px`;
    document.documentElement.style.setProperty('--sidebar-w', `${next}px`);
    if (map) map.invalidateSize();
  };
  const onUp = () => {
    sidebar.classList.remove('resizing');
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
  };

  handle.addEventListener('pointerdown', (event) => {
    if (!sidebarOpen) return;
    event.preventDefault();
    startX = event.clientX;
    startWidth = sidebar.getBoundingClientRect().width;
    sidebar.classList.add('resizing');
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp, { once: true });
  });
}

document.getElementById('sidebar-toggle').addEventListener('click', () => {
  if (isMobileMapViewport()) {
    const sidebarEl = document.getElementById('sidebar');
    sidebarEl?.classList.toggle('mobile-open');
    return;
  }
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  document.getElementById('toggle-arrow').textContent = sidebarOpen ? '◀' : '▶';
  setTimeout(() => map.invalidateSize(), 200);
});

/* ── Modal close on overlay click ── */
document.getElementById('flag-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeFlagModal();
});

/* ── Toast ── */
function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  toast.classList.toggle('error', isError);
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

/* ── Utilities ── */
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatArticleDate(value) {
  const time = value ? new Date(value).getTime() : 0;
  if (!Number.isFinite(time) || !time) return 'date unknown';
  return new Date(time).toLocaleDateString(undefined, {
    year: 'numeric',
    month: 'short',
    day: 'numeric',
  });
}

function timeAgo(dateStr) {
  if (!dateStr) return 'Unknown time';
  const now = Date.now();
  const then = new Date(dateStr).getTime();
  const diff = now - then;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return Math.floor(diff / 86400000) + 'd ago';
}
