<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map & Feed — Conflict Mapper</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<!-- Leaflet MarkerCluster CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

<style>
/* ── Reset / Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0c10;
  --surface: #12151c;
  --surface-2: #1a1e28;
  --surface-3: #222736;
  --border: rgba(255,255,255,0.1);
  --border-dim: rgba(255,255,255,0.06);
  --accent: #c41e3a;
  --accent-dim: rgba(196,30,58,0.08);
  --amber: #f59e0b;
  --green: #22c55e;
  --blue: #3b82f6;
  --purple: #a855f7;
  --text: #e8eaf0;
  --text-muted: rgba(232,234,240,0.55);
  --text-faint: rgba(232,234,240,0.3);
  --font-display: 'Rajdhani', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --font-body: 'Inter', sans-serif;
  --sidebar-w: 350px;
  --transition: 0.15s ease;
  --radius: 6px;
}

[data-theme="light"] {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface-2: #f5f7fa;
  --surface-3: #ebedf2;
  --border: rgba(0,0,0,0.1);
  --border-dim: rgba(0,0,0,0.06);
  --accent-dim: rgba(196,30,58,0.06);
  --text: #0f1117;
  --text-muted: rgba(15,17,23,0.55);
  --text-faint: rgba(15,17,23,0.35);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
}

/* ── Layout ── */
.map-shell {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  min-width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: width var(--transition), min-width var(--transition);
  position: relative;
  z-index: 10;
  overflow: hidden;
}
.sidebar.collapsed {
  width: 0;
  min-width: 0;
  border-right: none;
}

/* Sidebar header */
.sidebar-header {
  padding: 12px 14px 10px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border-dim);
  flex-shrink: 0;
}
.sidebar-title {
  font-family: var(--font-display);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.sidebar-title .live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2.5s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
  50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(34,197,94,0); }
}

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 10px;
  padding: 8px 14px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border-dim);
  flex-shrink: 0;
}
.stat-item {
  flex: 1;
  text-align: center;
}
.stat-val {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.stat-key {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  letter-spacing: 0.1em;
  color: var(--text-faint);
  text-transform: uppercase;
  margin-top: 2px;
}

/* Filters */
.sidebar-filters {
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border-dim);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.filter-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.filter-label {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  color: var(--text-faint);
  text-transform: uppercase;
  white-space: nowrap;
  width: 42px;
  flex-shrink: 0;
}
.filter-select {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius);
  padding: 4px 8px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text);
  outline: none;
  transition: border-color var(--transition);
}
.filter-select:focus { border-color: var(--accent); }

.category-checks {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.cat-check {
  display: flex;
  align-items: center;
  gap: 3px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  cursor: pointer;
}
.cat-check input { width: 12px; height: 12px; accent-color: var(--accent); }

/* Sidebar actions */
.sidebar-actions {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border-dim);
  flex-shrink: 0;
  display: flex;
  gap: 6px;
}

/* Feed */
.sidebar-feed {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.sidebar-feed::-webkit-scrollbar { width: 4px; }
.sidebar-feed::-webkit-scrollbar-track { background: transparent; }
.sidebar-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.feed-section-label {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  color: var(--text-faint);
  text-transform: uppercase;
  padding: 6px 14px 4px;
  border-top: 1px solid var(--border-dim);
  margin-top: 4px;
}

.article-item {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border-dim);
  cursor: pointer;
  transition: background var(--transition);
  position: relative;
}
.article-item:hover { background: var(--accent-dim); }

.article-title {
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 4px;
}
.article-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.article-source {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  text-transform: uppercase;
}
.article-time {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--text-faint);
}
.cat-badge {
  font-family: var(--font-mono);
  font-size: 0.52rem;
  letter-spacing: 0.06em;
  padding: 1px 5px;
  border-radius: 3px;
  text-transform: uppercase;
  font-weight: 600;
}
.cat-badge.conflict { background: rgba(196,30,58,0.18); color: #ef5b74; }
.cat-badge.political { background: rgba(245,158,11,0.18); color: #fbbf24; }
.cat-badge.technology { background: rgba(59,130,246,0.18); color: #60a5fa; }
.cat-badge.economic { background: rgba(34,197,94,0.18); color: #4ade80; }
.cat-badge.general { background: rgba(255,255,255,0.08); color: var(--text-faint); }

.flag-btn {
  position: absolute;
  right: 10px;
  top: 8px;
  font-size: 0.75rem;
  background: none;
  border: 1px solid var(--border-dim);
  border-radius: 3px;
  color: var(--text-faint);
  cursor: pointer;
  padding: 2px 5px;
  transition: all var(--transition);
  opacity: 0;
}
.article-item:hover .flag-btn { opacity: 1; }
.flag-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

.loading-feed {
  padding: 20px 14px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-faint);
  text-align: center;
  letter-spacing: 0.1em;
}
.empty-feed {
  padding: 20px 14px;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text-faint);
  text-align: center;
  letter-spacing: 0.08em;
  line-height: 1.6;
}

/* ── Collapse Toggle ── */
.sidebar-toggle {
  position: absolute;
  right: -16px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 48px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 4px 4px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 20;
  color: var(--text-muted);
  font-size: 0.6rem;
  transition: background var(--transition), color var(--transition);
}
.sidebar-toggle:hover { background: var(--surface-3); color: var(--text); }

/* ── Map Area ── */
.map-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#map {
  width: 100%;
  height: 100%;
}

/* Map overlay controls */
.map-controls {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.map-control-group {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.map-ctrl-btn {
  display: block;
  width: 100%;
  padding: 6px 10px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  background: none;
  border: none;
  border-bottom: 1px solid var(--border-dim);
  cursor: pointer;
  text-align: left;
  transition: all var(--transition);
  white-space: nowrap;
}
.map-ctrl-btn:last-child { border-bottom: none; }
.map-ctrl-btn:hover, .map-ctrl-btn.active { background: var(--accent-dim); color: var(--text); }
.map-ctrl-btn.active { color: var(--accent); }

/* Attribution fix for dark map */
.leaflet-control-attribution {
  background: rgba(10,12,16,0.8) !important;
  color: rgba(255,255,255,0.3) !important;
  font-size: 0.55rem !important;
}
.leaflet-control-attribution a { color: rgba(255,255,255,0.4) !important; }

/* Marker cluster customization */
.marker-cluster-small,
.marker-cluster-medium,
.marker-cluster-large {
  background: rgba(196,30,58,0.2) !important;
  border: 2px solid rgba(196,30,58,0.5) !important;
}
.marker-cluster-small div,
.marker-cluster-medium div,
.marker-cluster-large div {
  background: rgba(196,30,58,0.8) !important;
  color: #fff !important;
  font-family: var(--font-mono) !important;
  font-weight: 600 !important;
}

/* Popup styling */
.leaflet-popup-content-wrapper {
  background: var(--surface) !important;
  border: 1px solid var(--border) !important;
  border-radius: var(--radius) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  color: var(--text) !important;
}
.leaflet-popup-tip { background: var(--surface) !important; }
.leaflet-popup-content {
  margin: 10px 14px !important;
  font-family: var(--font-body) !important;
  font-size: 0.82rem !important;
}
.popup-title {
  font-family: var(--font-display);
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.3;
}
.popup-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
}
.popup-source {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.popup-actions {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.popup-btn {
  padding: 4px 8px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid var(--border-dim);
  background: var(--surface-2);
  color: var(--text-muted);
  transition: all var(--transition);
}
.popup-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.popup-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: var(--radius);
  font-family: var(--font-display);
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  transition: all var(--transition);
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #a01730; }
.btn-secondary {
  background: var(--surface-2);
  color: var(--text-muted);
  border: 1px solid var(--border-dim);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--text); }
.btn-sm { padding: 4px 8px; font-size: 0.68rem; }
.btn-full { width: 100%; }

/* ── Flag Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 9000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.modal-title {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 4px;
}
.modal-subtitle {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: var(--text-faint);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.form-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  text-transform: uppercase;
}
.form-input, .form-select, .form-textarea {
  background: var(--surface-2);
  border: 1px solid var(--border-dim);
  border-radius: 4px;
  padding: 7px 10px;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text);
  outline: none;
  transition: border-color var(--transition);
  width: 100%;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { height: 70px; resize: vertical; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  z-index: 99000;
  transform: translateY(20px);
  opacity: 0;
  transition: transform 0.25s ease, opacity 0.25s ease;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.toast.error .toast-dot { background: var(--accent); }

/* ── Responsive ── */
@media (max-width: 640px) {
  .sidebar { width: 100%; position: absolute; top: 0; left: 0; bottom: 0; z-index: 200; transform: translateX(-100%); transition: transform var(--transition); }
  .sidebar.mobile-open { transform: translateX(0); }
  .sidebar-toggle { display: none; }
}
</style>
</head>
<body>

<div class="map-shell">

  <!-- ── Sidebar ── -->
  <div class="sidebar" id="sidebar">

    <!-- Collapse toggle -->
    <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">
      <span id="toggle-arrow">◀</span>
    </button>

    <!-- Header -->
    <div class="sidebar-header">
      <div class="sidebar-title">
        <div class="live-dot"></div>
        Global Map &amp; Feed
      </div>

      <!-- Filters -->
      <div class="sidebar-filters" style="padding:0;border:none;gap:6px">
        <div class="filter-row">
          <span class="filter-label">Time</span>
          <select class="filter-select" id="filter-time" onchange="applyFilters()">
            <option value="1h">Last 1 hour</option>
            <option value="6h">Last 6 hours</option>
            <option value="24h" selected>Last 24 hours</option>
            <option value="7d">Last 7 days</option>
            <option value="30d">Last 30 days</option>
            <option value="all">All time</option>
          </select>
        </div>
        <div class="filter-row">
          <span class="filter-label">Country</span>
          <select class="filter-select" id="filter-country" onchange="applyFilters()">
            <option value="">All Countries</option>
            <option value="usa">United States</option>
            <option value="china">China</option>
            <option value="russia">Russia</option>
            <option value="ukraine">Ukraine</option>
            <option value="taiwan">Taiwan</option>
            <option value="iran">Iran</option>
            <option value="israel">Israel</option>
            <option value="india">India</option>
            <option value="pakistan">Pakistan</option>
            <option value="north-korea">North Korea</option>
            <option value="nato">NATO</option>
          </select>
        </div>
        <div style="padding-top:4px">
          <div class="filter-label" style="margin-bottom:4px;width:auto">Categories</div>
          <div class="category-checks">
            <label class="cat-check"><input type="checkbox" value="breaking" checked onchange="applyFilters()"> 🔴 Breaking</label>
            <label class="cat-check"><input type="checkbox" value="geopolitics" checked onchange="applyFilters()"> 🟡 Geopolitics</label>
            <label class="cat-check"><input type="checkbox" value="military" checked onchange="applyFilters()"> 🟠 Military</label>
            <label class="cat-check"><input type="checkbox" value="political" checked onchange="applyFilters()"> 🟡 Political</label>
            <label class="cat-check"><input type="checkbox" value="technology" checked onchange="applyFilters()"> 🔵 Tech</label>
            <label class="cat-check"><input type="checkbox" value="general" checked onchange="applyFilters()"> ⚪ General</label>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar" id="stats-bar">
      <div class="stat-item">
        <div class="stat-val" id="stat-total">—</div>
        <div class="stat-key">Articles</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="stat-geo">—</div>
        <div class="stat-key">Geotagged</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="stat-sources">—</div>
        <div class="stat-key">Sources</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="sidebar-actions">
      <button class="btn btn-primary btn-sm" onclick="refreshFeed()" id="refresh-btn">↻ Refresh</button>
      <button class="btn btn-secondary btn-sm" onclick="fetchAllFeeds()" id="fetch-btn">Fetch Feeds</button>
    </div>

    <!-- Feed list -->
    <div class="sidebar-feed" id="article-feed">
      <div class="loading-feed">Loading articles...</div>
    </div>

  </div><!-- .sidebar -->

  <!-- ── Map ── -->
  <div class="map-area">
    <div id="map"></div>

    <!-- Custom map controls -->
    <div class="map-controls">
      <div class="map-control-group">
        <button class="map-ctrl-btn active" id="layer-dark" onclick="setMapLayer('dark')">Dark</button>
        <button class="map-ctrl-btn" id="layer-satellite" onclick="setMapLayer('satellite')">Satellite</button>
        <button class="map-ctrl-btn" id="layer-topo" onclick="setMapLayer('topo')">Topographic</button>
      </div>
      <div class="map-control-group">
        <button class="map-ctrl-btn" id="heatmap-toggle" onclick="toggleHeatmap()">Heatmap</button>
        <button class="map-ctrl-btn" onclick="resetMapView()">Reset View</button>
      </div>
    </div>
  </div>

</div><!-- .map-shell -->

<!-- Flag Article Modal -->
<div class="modal-overlay" id="flag-modal">
  <div class="modal-card">
    <div class="modal-title">Flag for Analysis</div>
    <div class="modal-subtitle" id="flag-article-title"></div>
    <div class="form-group">
      <label class="form-label" for="flag-country">Associate with Country</label>
      <select class="form-select" id="flag-country">
        <option value="">Global / No specific country</option>
        <option value="usa">United States</option>
        <option value="china">China</option>
        <option value="russia">Russia</option>
        <option value="ukraine">Ukraine</option>
        <option value="taiwan">Taiwan</option>
        <option value="iran">Iran</option>
        <option value="israel">Israel</option>
        <option value="india">India</option>
        <option value="pakistan">Pakistan</option>
        <option value="north-korea">North Korea</option>
        <option value="nato">NATO</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="flag-notes">Notes (optional)</label>
      <textarea class="form-textarea" id="flag-notes" placeholder="Why is this article relevant?"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-sm" onclick="closeFlagModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="submitFlag()">Flag Article</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-msg">Done</span>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Leaflet MarkerCluster -->
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<!-- Leaflet Heat -->
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

<script>
'use strict';

/* ── State ── */
let map, markersLayer, heatLayer;
let allArticles = [];
let filteredArticles = [];
let currentMapLayer = 'dark';
let heatmapOn = false;
let pendingFlag = null;
let toastTimer = null;

const TILE_LAYERS = {
  dark: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  topo: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png'
};

const TILE_ATTRIBUTIONS = {
  dark: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  satellite: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP',
  topo: 'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, <a href="http://viewfinderpanoramas.org">SRTM</a>'
};

const CAT_COLORS = {
  breaking:    '#c41e3a',
  geopolitics: '#f59e0b',
  military:    '#f97316',
  political:   '#eab308',
  technology:  '#3b82f6',
  economic:    '#22c55e',
  general:     '#9ca3af',
  ai:          '#a855f7',
  research:    '#06b6d4',
  science:     '#06b6d4',
  conflict:    '#c41e3a',
};

/* ── Init ── */
function initMap() {
  map = L.map('map', {
    center: [20, 0],
    zoom: 2,
    zoomControl: true,
    attributionControl: true
  });

  // Initial dark tile layer
  L.tileLayer(TILE_LAYERS.dark, {
    attribution: TILE_ATTRIBUTIONS.dark,
    subdomains: 'abcd',
    maxZoom: 19,
    id: 'dark-layer'
  }).addTo(map);

  // Marker cluster group
  markersLayer = L.markerClusterGroup({
    showCoverageOnHover: false,
    maxClusterRadius: 50,
    spiderfyOnMaxZoom: true
  });
  map.addLayer(markersLayer);

  loadArticles();
}

/* ── Data loading ── */
async function loadArticles() {
  try {
    const [geoRes, feedRes] = await Promise.all([
      fetch('/api/articles/geo'),
      fetch('/api/articles?limit=100')
    ]);

    let geoArticles = [];
    let feedArticles = [];

    if (geoRes.ok) {
      const data = await geoRes.json();
      geoArticles = data.data?.articles || data.articles || (Array.isArray(data) ? data : []);
    }

    if (feedRes.ok) {
      const data = await feedRes.json();
      feedArticles = data.data?.articles || data.articles || (Array.isArray(data) ? data : []);
    }

    // Merge: use feedArticles as base, enrich with geo data
    const geoMap = {};
    geoArticles.forEach(a => { if (a.id) geoMap[a.id] = a; });

    // If feed API worked, use it; else use geo articles
    allArticles = feedArticles.length ? feedArticles.map(a => ({ ...a, ...(geoMap[a.id] || {}) })) : geoArticles;

    if (!allArticles.length) {
      // Use mock data for demo
      allArticles = getMockArticles();
    }

    updateStats();
    applyFilters();
  } catch(e) {
    // Fall back to mock data
    allArticles = getMockArticles();
    updateStats();
    applyFilters();
  }
}

async function refreshFeed() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.textContent = '↻ Loading...'; btn.disabled = true; }
  await loadArticles();
  if (btn) { btn.textContent = '↻ Refresh'; btn.disabled = false; }
  showToast('Feed refreshed');
}

async function fetchAllFeeds() {
  const btn = document.getElementById('fetch-btn');
  if (btn) { btn.textContent = 'Fetching...'; btn.disabled = true; }
  try {
    const res = await fetch('/api/feeds/fetch', { method: 'POST' });
    const data = await res.json();
    showToast(data.message || 'Feeds fetched');
    await loadArticles();
  } catch(e) {
    showToast('API not available — using demo data', true);
  } finally {
    if (btn) { btn.textContent = 'Fetch Feeds'; btn.disabled = false; }
  }
}

/* ── Filters ── */
function getActiveCategories() {
  return Array.from(document.querySelectorAll('.cat-check input:checked')).map(i => i.value);
}

function getTimeFilter() {
  const val = document.getElementById('filter-time')?.value || '24h';
  if (val === 'all') return null;
  const units = { '1h': 3600000, '6h': 21600000, '24h': 86400000, '7d': 604800000, '30d': 2592000000 };
  return Date.now() - (units[val] || units['24h']);
}

function applyFilters() {
  const cats = getActiveCategories();
  const since = getTimeFilter();
  const country = document.getElementById('filter-country')?.value || '';

  filteredArticles = allArticles.filter(a => {
    if (cats.length && !cats.includes(a.category || 'general')) return false;
    if (country && a.country !== country) return false;
    // Support both pubDate (API) and publishedAt (legacy/mock)
    const dateStr = a.pubDate || a.publishedAt;
    if (since && dateStr && new Date(dateStr).getTime() < since) return false;
    return true;
  });

  updateMapMarkers();
  updateFeedList();
  updateStats();
}

/* ── Map markers ── */
function updateMapMarkers() {
  markersLayer.clearLayers();

  const geoArticles = filteredArticles.filter(a => {
    const lat = a.lat || a.geo?.lat;
    const lng = a.lng || a.geo?.lng;
    return lat && lng && lat !== 0 && lng !== 0;
  });

  geoArticles.forEach(article => {
    const lat = article.lat || article.geo?.lat;
    const lng = article.lng || article.geo?.lng;
    const color = CAT_COLORS[article.category || 'general'] || CAT_COLORS.general;
    const marker = L.circleMarker([lat, lng], {
      radius: 7,
      fillColor: color,
      color: '#000',
      weight: 1,
      opacity: 0.9,
      fillOpacity: 0.8
    });

    marker.bindPopup(buildPopup(article), { maxWidth: 280, minWidth: 220 });
    markersLayer.addLayer(marker);
  });

  // Update heatmap if active
  if (heatmapOn) updateHeatmap();

  // Update stat
  document.getElementById('stat-geo').textContent = geoArticles.length;
}

function getGeoCoords(a) {
  const lat = a.lat || a.geo?.lat;
  const lng = a.lng || a.geo?.lng;
  return (lat && lng && lat !== 0 && lng !== 0) ? { lat, lng } : null;
}

function buildPopup(article) {
  const cat = article.category || 'general';
  const catColor = CAT_COLORS[cat] || CAT_COLORS.general;
  return `
    <div class="popup-title">${escHtml(article.title || 'Untitled')}</div>
    <div class="popup-meta">
      <span class="cat-badge ${cat}" style="background:${catColor}22;color:${catColor}">${escHtml(cat)}</span>
      <span class="popup-source">${escHtml(article.source || 'Unknown')}</span>
    </div>
    <div style="font-size:0.7rem;color:#888;margin-bottom:8px">${timeAgo(article.pubDate || article.publishedAt)}</div>
    <div class="popup-actions">
      ${article.url ? `<a href="${escHtml(article.url)}" target="_blank" rel="noopener" class="popup-btn primary" style="text-decoration:none">Read →</a>` : ''}
      <button class="popup-btn" onclick="openFlagModal(${JSON.stringify({ id: article.id, title: article.title }).replace(/"/g, '&quot;')})">⚑ Flag</button>
    </div>
  `;
}

/* ── Heatmap ── */
function toggleHeatmap() {
  heatmapOn = !heatmapOn;
  const btn = document.getElementById('heatmap-toggle');
  if (btn) btn.classList.toggle('active', heatmapOn);

  if (heatmapOn) {
    updateHeatmap();
  } else if (heatLayer) {
    map.removeLayer(heatLayer);
    heatLayer = null;
  }
}

function updateHeatmap() {
  if (heatLayer) map.removeLayer(heatLayer);
  const points = filteredArticles
    .filter(a => (a.lat || a.geo?.lat) && (a.lng || a.geo?.lng))
    .map(a => [a.lat || a.geo?.lat, a.lng || a.geo?.lng, 0.5]);

  if (points.length && typeof L.heatLayer === 'function') {
    heatLayer = L.heatLayer(points, {
      radius: 35,
      blur: 20,
      maxZoom: 10,
      gradient: { 0.4: '#3b82f6', 0.65: '#f59e0b', 1: '#c41e3a' }
    }).addTo(map);
  }
}

/* ── Map layers ── */
let currentTileLayer = null;
function setMapLayer(type) {
  if (currentTileLayer) map.removeLayer(currentTileLayer);
  currentTileLayer = L.tileLayer(TILE_LAYERS[type], {
    attribution: TILE_ATTRIBUTIONS[type],
    subdomains: type === 'dark' ? 'abcd' : 'abc',
    maxZoom: 19
  }).addTo(map);
  currentMapLayer = type;

  // Update button states
  document.querySelectorAll('[id^="layer-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('layer-' + type)?.classList.add('active');
}

function resetMapView() {
  map.setView([20, 0], 2);
}

/* ── Feed list ── */
function updateFeedList() {
  const container = document.getElementById('article-feed');
  if (!container) return;

  if (!filteredArticles.length) {
    container.innerHTML = `<div class="empty-feed">No articles match current filters.<br>Try expanding time range or categories.</div>`;
    return;
  }

  // Sort newest first
  const sorted = [...filteredArticles].sort((a, b) => {
    const ta = (a.pubDate || a.publishedAt) ? new Date(a.pubDate || a.publishedAt).getTime() : 0;
    const tb = (b.pubDate || b.publishedAt) ? new Date(b.pubDate || b.publishedAt).getTime() : 0;
    return tb - ta;
  });

  container.innerHTML = `
    <div class="feed-section-label">Live Articles (${sorted.length})</div>
    ${sorted.map(a => `
      <div class="article-item" onclick="focusArticle(${JSON.stringify(a).replace(/"/g, '&quot;')})">
        <button class="flag-btn" title="Flag for analysis" onclick="event.stopPropagation(); openFlagModal(${JSON.stringify({ id: a.id, title: a.title }).replace(/"/g, '&quot;')})">⚑</button>
        <div class="article-title">${escHtml(a.title || 'Untitled')}</div>
        <div class="article-meta">
          <span class="cat-badge ${a.category || 'general'}">${escHtml(a.category || 'general')}</span>
          <span class="article-source">${escHtml(a.source || 'Unknown')}</span>
          <span class="article-time">${timeAgo(a.pubDate || a.publishedAt)}</span>
        </div>
      </div>
    `).join('')}
  `;
}

function focusArticle(article) {
  const lat = article.lat || article.geo?.lat;
  const lng = article.lng || article.geo?.lng;
  if (lat && lng) {
    map.setView([lat, lng], 6, { animate: true });
  }
}

/* ── Stats ── */
function updateStats() {
  document.getElementById('stat-total').textContent = filteredArticles.length;
  document.getElementById('stat-geo').textContent = filteredArticles.filter(a => (a.lat || a.geo?.lat) && (a.lng || a.geo?.lng)).length;
  const sources = new Set(filteredArticles.map(a => a.source).filter(Boolean));
  document.getElementById('stat-sources').textContent = sources.size;
}

/* ── Flag modal ── */
function openFlagModal(article) {
  pendingFlag = article;
  document.getElementById('flag-article-title').textContent = article.title || 'Article';
  document.getElementById('flag-notes').value = '';
  document.getElementById('flag-country').value = '';
  document.getElementById('flag-modal').classList.add('open');
}

function closeFlagModal() {
  document.getElementById('flag-modal').classList.remove('open');
  pendingFlag = null;
}

async function submitFlag() {
  if (!pendingFlag) return;
  const country = document.getElementById('flag-country').value;
  const notes = document.getElementById('flag-notes').value.trim();

  try {
    const res = await fetch('/api/articles/flag', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ articleId: pendingFlag.id, country, notes })
    });
    if (res.ok) {
      showToast('Article flagged for analysis');
    } else {
      showToast('Flagged locally (API offline)', false);
    }
  } catch(e) {
    showToast('Flagged locally (API offline)', false);
  }
  closeFlagModal();
}

/* ── Sidebar toggle ── */
let sidebarOpen = true;
document.getElementById('sidebar-toggle').addEventListener('click', () => {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  document.getElementById('toggle-arrow').textContent = sidebarOpen ? '◀' : '▶';
  setTimeout(() => map.invalidateSize(), 200);
});

/* ── Modal close on overlay click ── */
document.getElementById('flag-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeFlagModal();
});

/* ── Toast ── */
function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  toast.classList.toggle('error', isError);
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

/* ── Utilities ── */
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function timeAgo(dateStr) {
  if (!dateStr) return 'Unknown time';
  const now = Date.now();
  const then = new Date(dateStr).getTime();
  const diff = now - then;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return Math.floor(diff / 86400000) + 'd ago';
}

    { id: '12', title: 'Ukraine receives new artillery systems from European allies', source: 'Defense Express', category: 'conflict', country: 'ukraine', lat: 50.4, lng: 30.5, publishedAt: new Date(Date.now() - 43200000).toISOString(), url: '#' }

/* ── Start ── */
initMap();
</script>
