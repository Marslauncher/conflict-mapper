name = "conflict-mapper-report-cron"
main = "src/index.js"
compatibility_date = "2026-05-28"

[observability]
enabled = true

[triggers]
# One feed-only RSS refresh plus independent daily report jobs. Keeping global,
# watch, and country jobs separate prevents long runs from sharing one invocation.
crons = [
  "* * * * *",
  "0 3 * * *",
  "15 3 * * *",
  "25 3 * * *",
  "30 8 * * *",
  "35 8 * * *",
  "40 8 * * *",
]

[[kv_namespaces]]
binding = "CONFIG_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "REPORTS_BUCKET"
bucket_name = "conflict-mapper-reports"

[[d1_databases]]
binding = "DB"
database_name = "conflict-mapper"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[vars]
AI_PROVIDER = "perplexity"
OPENROUTER_MODEL = "anthropic/claude-sonnet-4"
NVIDIA_MODEL = "nvidia/llama-3.3-nemotron-super-49b-v1"
STATIC_SITE_BASE_URL = "https://conflict-mapper.pages.dev"
REPORT_COUNTRIES = "usa,china,russia,ukraine,taiwan,iran,israel,india,pakistan,north-korea,nato"
FETCH_FEEDS_BEFORE_REPORTS = "true"
FEED_REFRESH_CRON = "* * * * *"
REPORT_FEED_LIMIT = "80"
REPORT_FEED_ITEMS_PER_FEED = "20"
REPORT_FEED_REFRESH_TIMEOUT_MS = "45000"
REPORT_STATUS_STALE_MINUTES = "5"
TRANSLATE_RSS_ARTICLES = "true"
RSS_TRANSLATION_LIMIT = "80"
REPORT_MAX_TOKENS = "12000"
ALLOW_REPORT_FALLBACK = "true"
REPORT_AI_TIMEOUT_MS = "75000"
REPORT_AI_ARTICLE_LIMIT = "24"
REPORT_GLOBAL_CRON = "0 3 * * *"
REPORT_WATCH_CRONS = "15 3 * * *|25 3 * * *"
REPORT_WATCH_SLUGS = "taiwan,korea"
REPORT_COUNTRY_CRONS = "30 8 * * *|35 8 * * *|40 8 * * *"
REPORT_COUNTRY_PARALLELISM = "2"
REPORT_GLOBAL_PROMPT_ID = "global"
REPORT_COUNTRY_PROMPT_ID = "country"
REPORT_WATCH_PROMPT_ID = "watch-taiwan"
REPORT_TAIWAN_WATCH_PROMPT_ID = "watch-taiwan"
REPORT_KOREA_WATCH_PROMPT_ID = "watch-korea"
FETCH_FEEDS_BEFORE_COUNTRY_REPORTS = "false"
