name = "conflict-mapper-report-cron"
main = "src/index.js"
compatibility_date = "2026-05-28"

[observability]
enabled = true

[triggers]
# 08:15 UTC daily. Adjust before deploy if you want a different window.
crons = [ "15 8 * * *" ]

[[kv_namespaces]]
binding = "CONFIG_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "REPORTS_BUCKET"
bucket_name = "conflict-mapper-reports"

[[d1_databases]]
binding = "DB"
database_name = "conflict-mapper"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[vars]
AI_PROVIDER = "perplexity"
OPENROUTER_MODEL = "anthropic/claude-sonnet-4"
STATIC_SITE_BASE_URL = "https://conflict-mapper.pages.dev"
REPORT_COUNTRIES = "usa,china,russia,ukraine,taiwan,iran,israel,india,pakistan,north-korea,nato"
